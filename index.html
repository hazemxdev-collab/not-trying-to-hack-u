<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Breach</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow: hidden;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    h1 {
      font-size: 70px;
      color: red;
      animation: glitch 0.2s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      25% { transform: translate(3px, -3px); }
      50% { transform: translate(-3px, 3px); }
      75% { transform: translate(3px, 3px); }
      100% { transform: translate(0); }
    }

    #terminal {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 18px;
      white-space: pre-line;
    }

    .popup {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      border: 3px solid red;
      color: red;
      font-weight: bold;
      padding: 20px;
      font-size: 20px;
      z-index: 9999;
      box-shadow: 0 0 20px red;
    }
  </style>
</head>
<body>

<div class="center">
  <h1>YOU GOT HACKED</h1>
</div>

<div id="terminal"></div>

<script>
  const terminal = document.getElementById("terminal");

  const lines = [
    "Initializing breach...",
    "Bypassing firewall...",
    "Access granted.",
    "Downloading personal data...",
    "Tracking location...",
    "Uploading files..."
  ];

  let i = 0;

  function typeLine() {
    if (i < lines.length) {
      terminal.innerHTML += lines[i] + "\n";
      i++;
      setTimeout(typeLine, 600);
    }
  }

  setTimeout(typeLine, 800);

  // 🔴 Fake popup
  setTimeout(() => {
    const popup = document.createElement("div");
    popup.className = "popup";
    popup.innerHTML = "⚠️ CAN THIS SITE ACCESS YOUR ADDRESS?";
    document.body.appendChild(popup);
  }, 2000);

  // 📥 Force download (auto)
  function forceDownload() {
    const blob = new Blob([""], { type: "application/zip" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "private_data.zip";

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  setTimeout(forceDownload, 2500);

  // 😂 Reveal prank
  setTimeout(() => {
    document.body.innerHTML = `
      <div class="center">
        <h1 style="color:white;">APRIL FOOLS 😂</h1>
        <p style="color:gray;">You’re safe bro</p>
      </div>
    `;
  }, 7000);
</script>

</body>
</html>
